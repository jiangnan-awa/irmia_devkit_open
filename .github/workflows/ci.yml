name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff

      - name: Syntax check (compile all .py)
        run: |
          echo "=== compileall ==="
          python -m compileall -q tools/ main.py
          echo "OK"

      - name: Ruff lint
        run: |
          ruff check tools/ main.py --select E,F --ignore E501,E402,E701,E741

      - name: Import smoke test
        run: |
          cd tools
          python -c "
          import importlib, sys
          ok = 0; fail = 0
          for f in sorted(__import__('os').listdir('.')):
              if f.endswith('.py') and not f.startswith('_') and not f.startswith('config'):
                  name = f[:-3]
                  try:
                      importlib.import_module(name)
                      ok += 1
                  except Exception as e:
                      print(f'  FAIL {name}: {e}')
                      fail += 1
          print(f'{ok} passed, {fail} failed')
          sys.exit(1 if fail else 0)
          "
